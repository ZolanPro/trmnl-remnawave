---
strategy: polling
name: Remnawave Dashboard
polling_verb: get
polling_url: |
  {{ api_url }}/api/system/stats
  {{ api_url }}/api/system/stats/bandwidth
  {{ api_url }}/api/nodes
polling_headers: "Authorization=Bearer {{ api_token }}&Accept=application/json"
no_screen_padding: 'no'
dark_mode: 'no'
refresh_interval: 15
custom_fields:
  - keyname: author_bio
    field_type: author_bio
    name: About This Plugin
    description: >-
      Remnawave panel stats for TRMNL (traffic, nodes, users, online).<br/><br/>
      Setup: create an API token in your Remnawave dashboard, then set API URL
      (e.g. <a href="https://your-panel.example.com">https://your-panel.example.com</a>)
      and API Token below. Leave Polling Body empty.
    category: analytics
    github_url: https://github.com/ZolanPro/trmnl-remnawave
    email_address: ZolanPro@gmail.com

  - keyname: api_url
    field_type: text
    name: API URL
    description: Base URL of your Remnawave instance (no trailing slash)
    placeholder: https://vpn.example.com
    help_text: >-
      Example — <a href="https://vpn.example.com">https://vpn.example.com</a>

  - keyname: api_token
    field_type: password
    name: API Token
    description: Bearer JWT from Remnawave (API tokens / panel settings)
    help_text: Paste the token only — the Authorization header is added automatically
